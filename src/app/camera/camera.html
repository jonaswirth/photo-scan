<div>
    <video id="video" autoplay></video>
</div>
<button routerLink="" matButton="outlined">
    <mat-icon aria-label="Take photo" fontIcon="cancel"></mat-icon>
    Cancel
</button>
<button (click)="capture()" matButton="outlined">
    <mat-icon aria-label="Take photo" fontIcon="camera_alt"></mat-icon>
    OK
</button>
<canvas [width]="width" [height]="height" style="display: none;" id="canvas"></canvas>
